<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>dashi · point cloud viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --ink: #1a1612;
      --paper: #faf6ee;
      --cream: #f4ede1;
      --amber: #c8821f;
      --kombu: #3d5a3a;
      --seal: #b8421f;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ink);
      color: var(--cream);
      overflow: hidden;
    }
    #map {
      position: absolute;
      inset: 0;
    }
    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(26, 22, 18, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(244, 237, 225, 0.15);
      border-radius: 8px;
      padding: 16px 18px;
      max-width: 380px;
      font-size: 13px;
      line-height: 1.5;
    }
    #panel h1 {
      margin: 0 0 4px 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--amber);
    }
    #panel p {
      margin: 4px 0;
      opacity: 0.85;
    }
    #panel input[type=text] {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      padding: 6px 8px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid rgba(244, 237, 225, 0.2);
      border-radius: 4px;
    }
    #panel button {
      margin-top: 8px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      background: var(--amber);
      color: var(--ink);
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #panel button:hover {
      background: #e8a547;
    }
    #panel button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(244, 237, 225, 0.15);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      opacity: 0.75;
      min-height: 1em;
    }
    #status.error { color: var(--seal); }
    #status.ok    { color: var(--kombu); }
    #legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(26, 22, 18, 0.7);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h1>dashi point cloud viewer</h1>
    <p>Browser-side rendering. Two modes:</p>
    <p><strong>direct</strong> — paste a URL to a single LAS/LAZ/COPC file (downloads in full).<br>
       <strong>3dtiles</strong> — paste a URL to a <code>tileset.json</code> (streams chunks).</p>
    <input id="url-input" type="text" placeholder="https://…/tileset.json   or   http://localhost:19100/.../points.copc.laz?…">
    <select id="mode-select" style="margin-top:8px;width:100%;padding:6px;font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--paper);color:var(--ink);border:1px solid rgba(244,237,225,0.2);border-radius:4px;">
      <option value="auto">auto (URL ends with tileset.json → 3dtiles, else direct)</option>
      <option value="direct">direct LAS/LAZ</option>
      <option value="3dtiles">3D Tiles tileset</option>
    </select>
    <button id="load-btn">Load</button>
    <div id="status"></div>
  </div>
  <div id="legend">RGB · drag-rotate · wheel-zoom · shift-drag pan</div>

  <script type="module">
    import {Deck, OrbitView}        from 'https://cdn.jsdelivr.net/npm/@deck.gl/core@9.0.32/+esm';
    import {PointCloudLayer}        from 'https://cdn.jsdelivr.net/npm/@deck.gl/layers@9.0.32/+esm';
    import {Tile3DLayer}            from 'https://cdn.jsdelivr.net/npm/@deck.gl/geo-layers@9.0.32/+esm';
    import {load}                   from 'https://cdn.jsdelivr.net/npm/@loaders.gl/core@4.3.2/+esm';
    import {LASLoader}              from 'https://cdn.jsdelivr.net/npm/@loaders.gl/las@4.3.2/+esm';
    import {Tiles3DLoader}          from 'https://cdn.jsdelivr.net/npm/@loaders.gl/3d-tiles@4.3.2/+esm';

    const $url    = document.getElementById('url-input');
    const $btn    = document.getElementById('load-btn');
    const $mode   = document.getElementById('mode-select');
    const $status = document.getElementById('status');

    // Pre-fill with a hint of where the bundled sample lives.
    const params = new URLSearchParams(location.search);
    if (params.get('url')) $url.value = params.get('url');

    const deck = new Deck({
      parent: document.getElementById('map'),
      views: new OrbitView({fov: 50, near: 0.1, far: 1e9}),
      initialViewState: {
        target: [0, 0, 0],
        rotationX: 30,
        rotationOrbit: 0,
        zoom: 1
      },
      controller: true,
      onLoad: () => setStatus('Ready. Paste a URL above.', 'ok')
    });

    function setStatus(msg, kind) {
      $status.textContent = msg;
      $status.className = kind || '';
    }

    function detectMode(url) {
      const m = $mode.value;
      if (m !== 'auto') return m;
      return url.toLowerCase().endsWith('tileset.json') ? '3dtiles' : 'direct';
    }

    async function loadTileset(url) {
      const layer = new Tile3DLayer({
        id: 'tileset',
        data: url,
        loader: Tiles3DLoader,
        pointSize: 1.5,
        onTilesetLoad: (tileset) => {
          const {cartographicCenter, zoom} = tileset;
          deck.setProps({
            initialViewState: {
              target: [0, 0, 0],
              rotationX: 30,
              rotationOrbit: 0,
              zoom: zoom ?? 1
            }
          });
          setStatus(
            `Loaded tileset · root tiles=${tileset.tiles?.length ?? '?'} · `
            + `centre=${cartographicCenter?.map(v=>v.toFixed(3)).join(' ')}`,
            'ok'
          );
        }
      });
      deck.setProps({layers: [layer]});
    }

    async function loadCloud(url) {
      $btn.disabled = true;
      const mode = detectMode(url);
      setStatus(`Fetching ${url.slice(0, 60)}…  [mode: ${mode}]`);

      try {
        if (mode === '3dtiles') {
          await loadTileset(url);
          $btn.disabled = false;
          return;
        }

        const data = await load(url, LASLoader, {
          worker: false,
          las: {skip: 1, fp64: false}
        });

        const positions = data.attributes.POSITION.value;
        const colors    = data.attributes.COLOR_0?.value;
        const n         = positions.length / 3;

        if (n === 0) throw new Error('no points decoded');

        // Centre + scale so the cloud fits a 1000-unit cube.
        let cx=0, cy=0, cz=0;
        for (let i=0; i<n; i++) {
          cx += positions[i*3];
          cy += positions[i*3+1];
          cz += positions[i*3+2];
        }
        cx /= n; cy /= n; cz /= n;

        let span = 0;
        for (let i=0; i<n; i++) {
          const dx = positions[i*3]   - cx;
          const dy = positions[i*3+1] - cy;
          const dz = positions[i*3+2] - cz;
          span = Math.max(span, Math.abs(dx), Math.abs(dy), Math.abs(dz));
        }
        const scale = span > 0 ? 500 / span : 1;

        // Centred + scaled coordinates.
        const out = new Float32Array(positions.length);
        for (let i=0; i<n; i++) {
          out[i*3]   = (positions[i*3]   - cx) * scale;
          out[i*3+1] = (positions[i*3+1] - cy) * scale;
          out[i*3+2] = (positions[i*3+2] - cz) * scale;
        }

        const layer = new PointCloudLayer({
          id: 'cloud',
          coordinateSystem: 1,
          data: {length: n, attributes: {
            getPosition: {value: out, size: 3},
            ...(colors ? {getColor: {value: colors, size: 4, normalized: true}} : {})
          }},
          getColor: colors ? undefined : [200, 130, 31],
          pointSize: 1.5
        });

        deck.setProps({layers: [layer]});

        setStatus(`Loaded ${n.toLocaleString()} points · centre ${cx.toFixed(0)} ${cy.toFixed(0)} ${cz.toFixed(0)}`, 'ok');
      } catch (e) {
        console.error(e);
        setStatus(`Error: ${e.message}`, 'error');
      } finally {
        $btn.disabled = false;
      }
    }

    $btn.addEventListener('click', () => {
      const url = $url.value.trim();
      if (url) loadCloud(url);
    });

    if ($url.value) loadCloud($url.value);
  </script>
</body>
</html>
