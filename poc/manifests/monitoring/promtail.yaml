apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: dashi-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: dashi-monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: dashi-monitoring
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      log_level: warn
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki.dashi-monitoring.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: dashi
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        # Only ship logs from dashi-* namespaces. Everything else (kube-system,
        # local-path, traefik) stays on the node and never enters Loki.
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: dashi-.*
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: dashi-monitoring
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/component: log-shipper
    app.kubernetes.io/part-of: dashi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        app.kubernetes.io/component: log-shipper
        app.kubernetes.io/part-of: dashi
    spec:
      serviceAccountName: promtail
      tolerations:
        - operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:3.3.2
          args:
            - "-config.file=/etc/promtail/promtail.yml"
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - { name: http, containerPort: 9080 }
          volumeMounts:
            - { name: config,    mountPath: /etc/promtail }
            - { name: pods,      mountPath: /var/log/pods,           readOnly: true }
            - { name: container, mountPath: /var/lib/docker/containers, readOnly: true }
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
      volumes:
        - { name: config,    configMap: { name: promtail-config } }
        - { name: pods,      hostPath:  { path: /var/log/pods } }
        - { name: container, hostPath:  { path: /var/lib/docker/containers } }
