apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: miso-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: miso
        platform: dashi

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes API server
      - job_name: kubernetes-apiservers
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: default;kubernetes;https

      # Kubelet metrics (node-level)
      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # cAdvisor (per-pod CPU/mem/network metrics)
      - job_name: kubernetes-cadvisor
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # Pods that opt in via annotations
      # Any Pod with:
      #   prometheus.io/scrape=true, prometheus.io/port=<port>, prometheus.io/path=/metrics (optional)
      # will be auto-discovered.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

      # Kube-state-metrics
      - job_name: kube-state-metrics
        static_configs:
          - targets: ['kube-state-metrics.miso-monitoring.svc.cluster.local:8080']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: miso-monitoring
data:
  dashi-alerts.yaml: |
    groups:
      - name: dashi.platform
        interval: 30s
        rules:
          - alert: PodCrashLoop
            expr: max_over_time(kube_pod_container_status_restarts_total[5m]) - min_over_time(kube_pod_container_status_restarts_total[5m]) > 3
            for: 10m
            labels:
              severity: warning
              stack: dashi
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently"
              description: "{{ $labels.pod }} in {{ $labels.namespace }} has > 3 restarts in 5 minutes."

          - alert: DashiPodDown
            expr: kube_pod_status_phase{namespace=~"miso-.*", phase=~"Failed|Unknown"} > 0
            for: 5m
            labels:
              severity: critical
              stack: dashi
            annotations:
              summary: "dashi pod {{ $labels.namespace }}/{{ $labels.pod }} in bad state"
              description: "Pod phase {{ $labels.phase }} — check kubectl logs."

          - alert: PVCFull
            expr: (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.2
            for: 10m
            labels:
              severity: warning
              stack: dashi
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} < 20% free"
              description: "Backfill cadence or retention tuning likely needed."

          - alert: DashiIngestFlowFailure
            expr: increase(prefect_flow_run_total{state_type="FAILED"}[1h]) > 0
            for: 1m
            labels:
              severity: warning
              stack: dashi
              component: ingest
            annotations:
              summary: "Prefect ingest flow failed"
              description: "A dashi-ingest flow-run entered FAILED state in the last hour."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: miso-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: miso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: miso-monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web
