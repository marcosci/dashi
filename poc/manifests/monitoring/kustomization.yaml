apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dashi-monitoring
resources:
  - namespace.yaml
  - rbac.yaml
  - kube-state-metrics.yaml
  - prometheus.yaml
  - grafana.yaml
  - loki.yaml
  - promtail.yaml
labels:
  - pairs:
      app.kubernetes.io/part-of: dashi
    includeSelectors: false
