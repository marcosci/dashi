apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: dashi-monitoring
data:
  loki.yml: |
    # Single-binary Loki for the dashi PoC. Filesystem chunks + BoltDB
    # shipper in /data; replace with object-store + memcached for production.
    auth_enabled: false
    server:
      http_listen_port: 3100
      log_level: warn
    common:
      path_prefix: /data
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2026-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      filesystem:
        directory: /data/chunks
      tsdb_shipper:
        active_index_directory: /data/tsdb-active
        cache_location: /data/tsdb-cache
    compactor:
      working_directory: /data/compactor
      delete_request_store: filesystem
    limits_config:
      retention_period: 168h    # 7 days
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      max_query_series: 5000
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    analytics:
      reporting_enabled: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: dashi-monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: dashi-monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: log-store
    app.kubernetes.io/part-of: dashi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
        app.kubernetes.io/component: log-store
        app.kubernetes.io/part-of: dashi
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.3.2
          args: ["-config.file=/etc/loki/loki.yml"]
          ports:
            - { name: http, containerPort: 3100 }
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data,   mountPath: /data }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
      volumes:
        - { name: config, configMap: { name: loki-config } }
        - { name: data,   persistentVolumeClaim: { claimName: loki-data } }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: dashi-monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: loki
  ports:
    - { name: http, port: 3100, targetPort: http }
