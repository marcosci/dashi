                - { name: PGHOST,     value: serving-postgis.dashi-serving-db.svc.cluster.local }
                - { name: PGPORT,     value: "5432" }
                - { name: PGDATABASE, value: serving }
                - { name: PGUSER,     valueFrom: { secretKeyRef: { name: serving-postgis, key: POSTGRES_USER } } }
                - { name: PGPASSWORD, valueFrom: { secretKeyRef: { name: serving-postgis, key: POSTGRES_PASSWORD } } }
                - { name: DASHI_S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: dashi-rustfs-pipeline, key: endpoint } } }
                - { name: DASHI_S3_ACCESS_KEY, valueFrom: { secretKeyRef: { name: dashi-rustfs-pipeline, key: access-key } } }
                - { name: DASHI_S3_SECRET_KEY, valueFrom: { secretKeyRef: { name: dashi-rustfs-pipeline, key: secret-key } } }
                - { name: DASHI_OFFSITE_ENDPOINT,   valueFrom: { secretKeyRef: { name: dashi-offsite, key: endpoint,   optional: true } } }
                - { name: DASHI_OFFSITE_BUCKET,     valueFrom: { secretKeyRef: { name: dashi-offsite, key: bucket,     optional: true } } }
                - { name: DASHI_OFFSITE_ACCESS_KEY, valueFrom: { secretKeyRef: { name: dashi-offsite, key: access-key, optional: true } } }
                - { name: DASHI_OFFSITE_SECRET_KEY, valueFrom: { secretKeyRef: { name: dashi-offsite, key: secret-key, optional: true } } }
              volumeMounts:
                - { name: scripts, mountPath: /scripts }
              resources:
                requests: { cpu: 100m, memory: 128Mi }
                limits:   { cpu: 500m, memory: 512Mi }
          volumes:
            - { name: scripts, configMap: { name: backup-script, defaultMode: 0o755 } }
