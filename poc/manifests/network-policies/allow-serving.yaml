# TiTiler + DuckDB endpoint in miso-serving accept ingress from any
# namespace (public consumer surface). Tighten in Phase 3 once we enforce
# authN/Z at the ingress layer.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-serving-public
  namespace: miso-serving
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [titiler, duckdb-endpoint]
  policyTypes: [Ingress]
  ingress:
    - {}   # all sources — PoC posture
