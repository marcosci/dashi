# RustFS in miso-platform accepts ingress only from:
#   - miso-data (ingest writers + pipeline workers)
#   - miso-serving (read-only consumers)
#   - miso-monitoring (Prometheus scraper)
# and from kubectl port-forward (api-server proxy — ingress from
# kube-system). All other namespaces cannot reach RustFS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rustfs-clients
  namespace: miso-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: miso-data
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: miso-serving
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: miso-monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
