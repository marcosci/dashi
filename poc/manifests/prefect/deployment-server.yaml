apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  namespace: miso-data
  labels:
    app.kubernetes.io/name: prefect-server
    app.kubernetes.io/part-of: miso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prefect-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prefect-server
    spec:
      containers:
        - name: prefect
          image: prefecthq/prefect:3.6.27-python3.12
          imagePullPolicy: IfNotPresent
          command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
          ports:
            - name: api
              containerPort: 4200
          env:
            - name: PREFECT_API_URL
              value: "http://localhost:4200/api"
            - name: PREFECT_SERVER_API_HOST
              value: "0.0.0.0"
            - name: PREFECT_HOME
              value: "/var/lib/prefect"
          readinessProbe:
            httpGet:
              path: /api/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /api/ready
              port: api
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/prefect
      volumes:
        - name: data
          emptyDir: {}
