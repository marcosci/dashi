apiVersion: v1
kind: Secret
metadata:
  name: prefect-db
  namespace: dashi-data
type: Opaque
stringData:
  POSTGRES_USER: prefect
  POSTGRES_PASSWORD: CHANGE_ME_PREFECT_DB
  POSTGRES_DB: prefect
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prefect-db
  namespace: dashi-data
  labels:
    app.kubernetes.io/name: prefect-db
    app.kubernetes.io/part-of: dashi
spec:
  serviceName: prefect-db-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prefect-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prefect-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: pg
              containerPort: 5432
          envFrom:
            - secretRef:
                name: prefect-db
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "prefect", "-d", "prefect"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "prefect", "-d", "prefect"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prefect-db
  namespace: dashi-data
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prefect-db
  ports:
    - name: pg
      port: 5432
      targetPort: pg
---
apiVersion: v1
kind: Service
metadata:
  name: prefect-db-headless
  namespace: dashi-data
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: prefect-db
  ports:
    - name: pg
      port: 5432
      targetPort: pg
