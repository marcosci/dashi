apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-worker
  namespace: dashi-data
  labels:
    app.kubernetes.io/name: prefect-worker
    app.kubernetes.io/part-of: dashi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prefect-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prefect-worker
    spec:
      serviceAccountName: prefect-worker
      containers:
        - name: worker
          image: prefecthq/prefect:3.6.27-python3.12
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              pip install --no-cache-dir --quiet "prefect-kubernetes>=0.5"
              exec prefect worker start --pool dashi-default --type kubernetes
          env:
            - name: PREFECT_API_URL
              value: "http://prefect-server.dashi-data.svc.cluster.local:4200/api"
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import urllib.request,sys; urllib.request.urlopen('http://prefect-server.dashi-data.svc.cluster.local:4200/api/health', timeout=3).read() or sys.exit(1)"
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
