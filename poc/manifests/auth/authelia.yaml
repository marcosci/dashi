apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-data
  namespace: dashi-auth
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: dashi-auth
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: oidc-issuer
    app.kubernetes.io/part-of: dashi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authelia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authelia
        app.kubernetes.io/component: oidc-issuer
        app.kubernetes.io/part-of: dashi
    spec:
      # K8s auto-injects AUTHELIA_PORT_*, AUTHELIA_SERVICE_HOST, etc. env
      # vars (because the matching Service is named `authelia`). Authelia
      # interprets `AUTHELIA_*` as config and chokes on these. Disable.
      enableServiceLinks: false
      # Authelia chowns /config at startup. The ConfigMap mount is read-only
      # so it can't chown there. Initcontainer copies it into an emptyDir
      # which the main container then owns.
      initContainers:
        - name: copy-config
          image: busybox:1.37
          command: ["/bin/sh","-c","cp /config-src/* /config/ && chown -R 1000:1000 /config"]
          volumeMounts:
            - { name: config-src, mountPath: /config-src }
            - { name: config,     mountPath: /config }
      containers:
        - name: authelia
          image: ghcr.io/authelia/authelia:4.38
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9091
          env:
            - name: X_AUTHELIA_CONFIG
              value: /config/configuration.yml
            - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
              value: /secrets/jwt
            - name: AUTHELIA_SESSION_SECRET_FILE
              value: /secrets/session
            - name: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE
              value: /secrets/storage
            # OIDC HMAC secret: NOT set here. Setting it forces Authelia
            # to validate the OIDC issuer block, which we leave OFF until
            # auth-protect.sh registers a real RP. The script appends:
            #   - name: AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE
            #     value: /secrets/oidc-hmac
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: secrets
              mountPath: /secrets
              readOnly: true
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config-src
          configMap:
            name: authelia-config
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
        - name: secrets
          secret:
            secretName: authelia-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: dashi-auth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: authelia
  ports:
    - name: http
      port: 9091
      targetPort: http
