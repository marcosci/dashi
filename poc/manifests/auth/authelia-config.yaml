apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: dashi-auth
data:
  configuration.yml: |
    # Minimal Authelia configuration for the dashi PoC. Single user file
    # backend, no email, no 2FA. Replace the user-database, session
    # secrets, and OIDC client secrets before any non-PoC use.
    server:
      address: tcp://0.0.0.0:9091
    log:
      level: info
    totp:
      disable: true
    authentication_backend:
      file:
        path: /config/users.yml
        password:
          algorithm: argon2
    access_control:
      default_policy: one_factor
    session:
      name: dashi_session
      same_site: lax
      cookies:
        - domain: dashi.local
          authelia_url: https://auth.dashi.local
          default_redirection_url: https://grafana.dashi.local
    storage:
      local:
        path: /data/db.sqlite3
    notifier:
      filesystem:
        filename: /data/notification.txt
    identity_providers:
      oidc:
        # Authelia 4.38+ requires the keys/secrets here to be 64 char.
        # The bootstrap script generates real values into the Secret —
        # ConfigMap entries here are documentation only.
        cors:
          endpoints: [authorization, token, revocation, introspection, userinfo]
          allowed_origins: [https://grafana.dashi.local]
        clients:
          - client_id: grafana
            client_name: Grafana
            client_secret: '$pbkdf2-sha512$310000$BOOTSTRAP_ME$BOOTSTRAP_ME'
            public: false
            authorization_policy: one_factor
            redirect_uris:
              - https://grafana.dashi.local/login/generic_oauth
            scopes: [openid, profile, email, groups]
            grant_types: [authorization_code, refresh_token]
            response_types: [code]
            userinfo_signed_response_alg: none

  users.yml: |
    users:
      admin:
        displayname: dashi Admin
        # password = "ChangeMeNow" — replace before any non-PoC use
        password: '$argon2id$v=19$m=65536,t=3,p=4$BOOTSTRAP_ME$BOOTSTRAP_ME'
        email: admin@dashi.local
        groups: [admins, dashi]
