apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: dashi-auth
data:
  configuration.yml: |
    # Minimal Authelia 4.38 configuration for the dashi PoC.
    # Production hardening (replace before any non-PoC use):
    #   - real cookie domain + valid TLS at https://auth.<domain>
    #   - real argon2id-hashed admin password in users.yml
    #   - actual OIDC clients (this stub registers none — auth-protect.sh
    #     appends them per RP)
    log:
      level: info
    server:
      address: tcp://0.0.0.0:9091
    totp:
      disable: true
    authentication_backend:
      file:
        path: /config/users.yml
        password:
          algorithm: argon2
    access_control:
      default_policy: one_factor
    session:
      name: dashi_session
      same_site: lax
      cookies:
        - domain: dashi.local
          authelia_url: https://auth.dashi.local
          default_redirection_url: https://grafana.dashi.local
    storage:
      local:
        path: /data/db.sqlite3
    notifier:
      filesystem:
        filename: /data/notification.txt
    # OIDC issuer: intentionally OFF in the bootstrap config. Authelia 4.38
    # requires both `jwks` keys + at least one configured client at boot.
    # auth-protect.sh patches this ConfigMap with a real client + an RSA
    # JWKS, then restarts Authelia. Until that runs, Authelia operates as
    # a forward-auth gateway only.
  users.yml: |
    # Default admin: username=admin password=authelia
    # Replace before any non-PoC use:
    #   docker run --rm authelia/authelia:latest authelia hash-password 'NewPassword'
    users:
      admin:
        displayname: dashi Admin
        password: "$argon2id$v=19$m=65536,t=3,p=4$BpLnfgDsc2WD8F2q$o/vzA4myCqZZ36bUGsDY//8mKUYNZZaR0t4MFFSs+iM"
        email: admin@dashi.local
        groups: [admins, dashi]
