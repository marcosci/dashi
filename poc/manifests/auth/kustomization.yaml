apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - authelia-config.yaml
  - authelia.yaml
  # oauth2-proxy.yaml is intentionally not listed here — the bootstrap
  # script applies it once per protected namespace with rewritten env.

labels:
  - pairs:
      app.kubernetes.io/part-of: dashi
    includeSelectors: false
