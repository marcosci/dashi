apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-api
  namespace: dashi-web
  labels:
    app.kubernetes.io/name: ingest-api
    app.kubernetes.io/component: web-shim
    app.kubernetes.io/part-of: dashi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ingest-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingest-api
        app.kubernetes.io/component: web-shim
        app.kubernetes.io/part-of: dashi
    spec:
      containers:
        - name: api
          image: dashi/ingest-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8088}
          env:
            # PoC: trust a mock user so port-forward access works without
            # the Authelia ingress in front. Remove the two MOCK_* lines
            # in production — the ingress controller injects real
            # Remote-User / Remote-Groups headers.
            - {name: DASHI_API_MOCK_USER,   value: "dev@dashi.local"}
            - {name: DASHI_API_MOCK_GROUPS, value: "dashi,admins"}
            - {name: DASHI_API_S3_ENDPOINT,
               value: "http://rustfs.dashi-platform.svc.cluster.local:9000"}
            # Browser-reachable endpoint baked into presigned PUT URLs.
            # Default (`http://localhost:9000`) matches the stable
            # port-forward set up by `port-forward-all.sh` for local dev
            # against OrbStack / k3d. Production deployments behind an
            # nginx ingress should override this to "" so the per-request
            # Host header is used instead, keeping presigned URLs same-
            # origin with the SPA. Override via kustomize patch or
            # Helm values.
            - {name: DASHI_API_S3_PUBLIC_ENDPOINT, value: "http://localhost:9000"}
            - {name: DASHI_API_S3_ACCESS_KEY,
               valueFrom: {secretKeyRef: {name: dashi-rustfs-pipeline, key: access-key}}}
            - {name: DASHI_API_S3_SECRET_KEY,
               valueFrom: {secretKeyRef: {name: dashi-rustfs-pipeline, key: secret-key}}}
            - {name: DASHI_API_STAC_URL,
               value: "http://stac-fastapi.dashi-catalog.svc.cluster.local:8080"}
            - {name: DASHI_API_PREFECT_API_URL,
               value: "http://prefect-server.dashi-data.svc.cluster.local:4200/api"}
            - {name: DASHI_API_PREFECT_UI_URL,
               value: "http://localhost:4200"}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits:   {cpu: "1",  memory: 1Gi}
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-api
  namespace: dashi-web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ingest-api
  ports:
    - {name: http, port: 8088, targetPort: http}
