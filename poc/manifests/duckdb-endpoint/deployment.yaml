apiVersion: apps/v1
kind: Deployment
metadata:
  name: duckdb-endpoint
  namespace: dashi-serving
  labels:
    app.kubernetes.io/name: duckdb-endpoint
    app.kubernetes.io/part-of: dashi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: duckdb-endpoint
  template:
    metadata:
      labels:
        app.kubernetes.io/name: duckdb-endpoint
    spec:
      containers:
        - name: api
          image: dashi/duckdb-endpoint:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RUSTFS_ENDPOINT
              value: "http://rustfs.dashi-platform.svc.cluster.local:9000"
            - name: RUSTFS_REGION
              value: "us-east-1"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dashi-rustfs-serving
                  key: access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dashi-rustfs-serving
                  key: secret-key
            - name: QUERY_TIMEOUT_SEC
              value: "30"
            - name: MAX_ROWS
              value: "10000"
          readinessProbe:
            httpGet:
              path: /_mgmt/ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_mgmt/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
