apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-buckets
  namespace: dashi-platform
  labels:
    app.kubernetes.io/part-of: dashi
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs-bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "Waiting for RustFS to be reachable ..."
              until mc alias set dashi http://rustfs:9000 "$ACCESS_KEY" "$SECRET_KEY"; do
                sleep 3
              done
              for bucket in landing processed curated backups; do
                # Landing zone is the immutable source-of-truth (F-07).
                # Create with --with-lock so we can later attach a default
                # retention policy. Other zones don't need lock.
                if [ "$bucket" = "landing" ]; then
                  mc mb --with-lock --ignore-existing dashi/${bucket} || \
                    mc mb --ignore-existing dashi/${bucket}
                  mc retention set --default COMPLIANCE 30d dashi/${bucket} 2>/dev/null \
                    && echo "  ↳ landing: COMPLIANCE 30d retention set" \
                    || echo "  ↳ landing: object lock unsupported (cluster pre-existed); enabling versioning instead"
                  mc version enable dashi/${bucket} >/dev/null 2>&1 || true
                else
                  mc mb --ignore-existing dashi/${bucket}
                fi
                mc anonymous set none dashi/${bucket}
                echo "ensured bucket: ${bucket}"
              done
              echo "bucket init complete"
          env:
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-root
                  key: access-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-root
                  key: secret-key
