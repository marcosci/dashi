# Placeholder. The real Secret is created by scripts/tipg-bootstrap.sh
# (it derives the password from the dashi-serving-db root secret and writes
# it to dashi-serving/tipg-db). This stub is only here so kustomize can
# resolve the reference shape without secret data leaking into git.
apiVersion: v1
kind: Secret
metadata:
  name: tipg-db
  namespace: dashi-serving
type: Opaque
stringData:
  user:     dashi_serving_ro
  password: CHANGE_ME_TIPG_DB
  url:      "postgresql://dashi_serving_ro:CHANGE_ME_TIPG_DB@serving-postgis.dashi-serving-db.svc.cluster.local:5432/serving"
