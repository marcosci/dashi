apiVersion: apps/v1
kind: Deployment
metadata:
  name: stac-fastapi
  namespace: miso-catalog
  labels:
    app.kubernetes.io/name: stac-fastapi
    app.kubernetes.io/part-of: miso
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stac-fastapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stac-fastapi
    spec:
      containers:
        - name: api
          image: ghcr.io/stac-utils/stac-fastapi-pgstac:5.0.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_HOST
              value: "0.0.0.0"
            - name: APP_PORT
              value: "8080"
            - name: ENVIRONMENT
              value: "dev"
            - name: POSTGRES_HOST_READER
              value: pgstac
            - name: POSTGRES_HOST_WRITER
              value: pgstac
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pgstac-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: pgstac-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DBNAME
              valueFrom:
                secretKeyRef:
                  name: pgstac-credentials
                  key: POSTGRES_DB
            - name: USE_API_HYDRATE
              value: "false"
          readinessProbe:
            httpGet:
              path: /_mgmt/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /_mgmt/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
