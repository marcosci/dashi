apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgstac
  namespace: dashi-catalog
  labels:
    app.kubernetes.io/name: pgstac
    app.kubernetes.io/part-of: dashi
spec:
  serviceName: pgstac-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgstac
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgstac
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: ghcr.io/stac-utils/pgstac:v0.9.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: pg
              containerPort: 5432
          envFrom:
            - secretRef:
                name: pgstac-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgis"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgis"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
