name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff + import check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dashi-ingest (no GIS deps required for lint)
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check poc/ingest/src

      - name: Ruff format check
        run: ruff format --check poc/ingest/src

  shell:
    name: Shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # SC1091: skip "source not followed" for repo-relative sources.
          # SC2086: deliberate word-splitting in many of our scripts.
          # SC2155: declare-and-assign in scripts is fine here.
          find poc/scripts poc/smoke -type f -name '*.sh' -print0 \
            | xargs -0 shellcheck -e SC1091,SC2086,SC2155 || true
          # Hard fail only on the ingest helpers — bigger blast radius.
          shellcheck -e SC1091,SC2086,SC2155 \
            poc/scripts/k3s-up.sh \
            poc/scripts/k3s-down.sh \
            poc/scripts/ingest-sample.sh \
            poc/smoke/pointcloud.sh \
            poc/smoke/martin.sh

  manifests:
    name: K8s manifests (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - name: Validate every YAML under poc/manifests/
        # `--strict` rejects unknown fields. Skip CRDs we don't ship locally.
        run: |
          kubeconform \
            -summary \
            -ignore-missing-schemas \
            -strict \
            -kubernetes-version 1.31.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            $(find poc/manifests -name '*.yaml' -o -name '*.yml')

  docs:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements-docs.txt
      - run: mkdocs build --strict --site-dir site/

  viewer:
    name: Viewer bundle (esbuild)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/viewer/package.json

      - name: Install + bundle
        run: |
          cd docs/viewer
          npm install --no-audit --no-fund
          npm run build
          ls -lh viewer.bundle.js

      - name: Verify wasm assets present
        run: |
          test -s docs/viewer/laz-perf.wasm
          test -s docs/viewer/laz_rs_wasm_bg.wasm

  web-ingest:
    name: Web ingest (Vite + Vitest + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: poc/web/ingest/package.json

      - name: Install + typecheck + test + build
        run: |
          cd poc/web/ingest
          npm install --no-audit --no-fund
          npm run typecheck
          npm test
          npm run build

      - name: Bundle size budget (≤200 KB gz JS)
        run: |
          cd poc/web/ingest
          GZ=$(find dist/assets -name '*.js' -exec sh -c 'gzip -c "$1" | wc -c' _ {} \; | awk '{s+=$1} END {print s}')
          echo "JS gz size: $GZ bytes"
          test "$GZ" -le 204800 || { echo "JS bundle exceeds 200 KB gz budget"; exit 1; }

  ingest-api:
    name: Ingest API (FastAPI shim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Lint (ruff) + import smoke
        run: |
          pip install ruff
          ruff check poc/services/ingest-api/src
          ruff format --check poc/services/ingest-api/src

  e2e-cluster:
    name: E2E (kind cluster + storage smoke)
    runs-on: ubuntu-latest
    # Heavy job — only run on the main branch + PRs labelled `e2e`. Set
    # the label via `gh pr edit <n> --add-label e2e` to opt in. Saves CI
    # minutes on every doc-only PR.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    steps:
      - uses: actions/checkout@v4

      - name: Spin up kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: dashi-ci
          kubectl_version: v1.31.0
          wait: 120s

      - name: Smoke check — cluster is reachable
        run: |
          kubectl version --short || kubectl version
          kubectl cluster-info
          kubectl get nodes
          kubectl get ns

      - name: Apply RustFS storage manifests (single-replica, ephemeral)
        run: |
          # Substitute the placeholder root password before apply (CI only).
          export DASHI_CI_PASS=$(openssl rand -hex 16)
          sed "s/CHANGE_ME_ROOT_PASSWORD/${DASHI_CI_PASS}/g" \
            poc/manifests/rustfs/secret.yaml > /tmp/rustfs-secret.yaml
          kubectl apply -f poc/manifests/rustfs/namespace.yaml
          kubectl apply -f /tmp/rustfs-secret.yaml
          kubectl apply -f poc/manifests/rustfs/service.yaml
          kubectl apply -f poc/manifests/rustfs/statefulset.yaml
          kubectl apply -f poc/manifests/rustfs/job-buckets.yaml
          kubectl -n dashi-platform rollout status statefulset/rustfs --timeout=240s
          kubectl -n dashi-platform wait --for=condition=complete \
            job/rustfs-create-buckets --timeout=240s

      - name: Probe RustFS health endpoint
        run: |
          kubectl -n dashi-platform port-forward svc/rustfs 9000:9000 &
          PF=$!
          sleep 4
          # RustFS responds 403 on unauthenticated GET / — proves the server
          # is up and rejects anonymous reads. A real smoke would mint a
          # presigned URL; this CI only verifies the manifest applies.
          curl -s -o /dev/null -w '%{http_code}\n' http://localhost:9000/ \
            | grep -E '^(200|403)$'
          kill $PF || true
