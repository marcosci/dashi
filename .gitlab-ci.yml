# MISO — GitLab CI/CD
#
# Two jobs:
#   - docs:build       runs on every branch, validates the MkDocs site can build
#   - pages            deploys built site to GitLab Pages on `main`

stages:
  - validate
  - deploy

variables:
  PYTHON_IMAGE: "python:3.12-slim"

default:
  image: $PYTHON_IMAGE
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-docs.txt

docs:build:
  stage: validate
  script:
    # Not strict until logo asset is placed — see docs/assets/README.md
    - mkdocs build --site-dir site/
  artifacts:
    paths:
      - site/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'

pages:
  stage: deploy
  script:
    - mkdocs build --site-dir public/
  artifacts:
    paths:
      - public/
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
